name: Hourly Weather Alerts

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:

jobs:
  fetch-alerts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch NWS weather alerts for Durham County (NCC063)
        run: |
          python3 - <<'PYEOF'
          import json, datetime, requests
          from pathlib import Path

          # NWS requires User-Agent to be set or requests are rejected
          # This runs server-side so the User-Agent header is allowed
          ZONE = "NCC063"
          UA   = "durhamcivichub.org, nallam@dconc.gov"
          url  = f"https://api.weather.gov/alerts/active/zone/{ZONE}"
          out  = Path("data/alerts.json")

          try:
              r = requests.get(url, headers={"User-Agent": UA, "Accept": "application/geo+json"}, timeout=10)
              r.raise_for_status()
              features = r.json().get("features", [])
              alerts = [
                  {
                      "event":    f["properties"].get("event", "Weather Alert"),
                      "headline": f["properties"].get("headline", ""),
                      "url":      f["properties"].get("url") or f"https://alerts.weather.gov/search?zone={ZONE}",
                  }
                  for f in features
                  if f.get("properties", {}).get("status") == "Actual"
              ]
          except Exception as e:
              print(f"NWS fetch failed: {e}")
              # Keep existing alerts rather than clearing them on network failure
              try:
                  alerts = json.loads(out.read_text()).get("alerts", [])
              except Exception:
                  alerts = []

          payload = {
              "updated": datetime.datetime.now(datetime.timezone.utc).isoformat(),
              "alerts": alerts,
          }
          out.write_text(json.dumps(payload, indent=2))
          print(f"Wrote {len(alerts)} alert(s)")
          PYEOF

      - name: Commit if alerts changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/alerts.json
          git diff --staged --quiet || git commit -m "chore: update weather alerts $(date +%Y-%m-%dT%H:%M)"
          git push
