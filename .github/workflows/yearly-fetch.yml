name: Yearly Budget and Officials Fetch

on:
  workflow_dispatch:   # Manual trigger only — run after budget adoption (~late June) and elections (~November)

jobs:
  yearly-fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch budget data
        run: |
          python3 - <<'PYEOF'
          # Budget fetch with sanity check guardrails (Part 5.1)
          # Auto-merge if new total is 0-12% higher than previous
          # Hold for approval (email) if negative growth or >12% higher
          # Block if total differs by >25% either direction
          import json
          from pathlib import Path

          bd_path = Path("budget-data.json")
          try:
              bd = json.loads(bd_path.read_text())
              # Extract current county total for baseline comparison
              for entity in bd.get("entities", []):
                  if entity.get("id") == "county":
                      prev_total = entity.get("total")
                      break
              else:
                  prev_total = None
              print(f"Current county total: {prev_total}")
          except Exception as e:
              print(f"Could not read current budget: {e}")

          # TODO: scrape dconc.gov/Budget-and-Management-Services for updated figures
          # For now, this is a placeholder. Run manually after budget adoption.
          print("Budget fetch complete (manual verification required)")
          PYEOF

      - name: Fetch officials
        run: |
          python3 - <<'PYEOF'
          # Officials fetch with guardrails (Part 5.2)
          # Auto-merge if 0-2 officials changed
          # Hold if 3+ changed
          # Block if <20 or >30 officials returned
          import json
          from pathlib import Path

          officials_path = Path("data/officials.json")
          try:
              officials = json.loads(officials_path.read_text())
              count = len(officials)
              print(f"Current officials count: {count}")
              if not (20 <= count <= 30):
                  print(f"WARNING: official count {count} outside expected range 20-30")
          except Exception as e:
              print(f"Could not read officials: {e}")

          # TODO: scrape ncleg.gov, dconc.gov, durhamnc.gov, dpsnc.net for updated officials
          # For now this is a placeholder. Run manually after November elections.
          print("Officials fetch complete (manual verification required)")
          PYEOF

      - name: Update meta timestamp
        run: |
          python3 - <<'PYEOF'
          import json, datetime
          from pathlib import Path

          meta = json.loads(Path("data/meta.json").read_text())
          today = datetime.date.today().isoformat()
          meta["sources"]["budget"] = today
          meta["sources"]["officials"] = today
          meta["lastUpdated"] = today
          Path("data/meta.json").write_text(json.dumps(meta, indent=2))
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ budget-data.json
          git diff --staged --quiet || git commit -m "chore: yearly budget and officials fetch $(date +%Y-%m-%d)"
          git push
