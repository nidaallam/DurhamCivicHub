name: Update Civic Data

on:
  schedule:
    - cron: '0 12 * * *'   # Daily 7:00 AM ET (noon UTC)
    - cron: '0 12 1-30 6 *' # Daily in June — catches budget doc whenever posted
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update civic data
        run: python scripts/update_civic_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ meetings.json calendar.json budget-data.json
          git diff --staged --quiet || git commit -m "chore: auto-update civic data $(date +%Y-%m-%d)"
          git push
