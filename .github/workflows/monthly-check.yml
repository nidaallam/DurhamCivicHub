name: Monthly Resource Link Check

on:
  schedule:
    - cron: '0 10 1 * *'  # 1st of every month at 10 AM UTC (6 AM ET)
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Check resource links
        run: python scripts/check_resources.py

      - name: Update validation log
        run: |
          python3 - <<'PYEOF'
          import json, datetime
          from pathlib import Path

          log_path = Path("data/validation-log.json")
          try:
              log = json.loads(log_path.read_text())
          except Exception:
              log = {"lastRun": None, "broken": [], "checked": 0}

          log["lastRun"] = datetime.date.today().isoformat()
          log_path.write_text(json.dumps(log, indent=2))
          PYEOF

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/validation-log.json
          git diff --staged --quiet || git commit -m "chore: monthly link check $(date +%Y-%m-%d)"
          git push
